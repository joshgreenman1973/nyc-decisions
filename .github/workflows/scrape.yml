name: Nightly scrape + build

on:
  schedule:
    # 06:00 UTC = 02:00 EDT / 01:00 EST
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python build.py
      - name: Commit data + index
        run: |
          git config user.name "nyc-decisions-bot"
          git config user.email "actions@github.com"
          git add data/normalized site/index site/feeds
          if ! git diff --cached --quiet; then
            git commit -m "Nightly scrape: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
